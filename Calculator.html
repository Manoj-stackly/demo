<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a24b1;
        }

        h1 {
            text-align: center;
            font-family: arial;
            margin-top: 50px;
        }

        .container {
            width: 300px;
            background-color: rgb(79, 79, 79);
            margin: auto;
            border-radius: 5px;
            margin-top: 100px;
            color: white;
        }

        .calculator {

            padding: 15px;
            display: grid;
            grid-template-columns: repeat(4, 60px);

        }

        input {
            grid-column: span 4;
            width: 250px;
            height: 40px;
            font-size: 25px;
            font-weight: 600;
            font-family: Arial, Helvetica, sans-serif;
            margin-bottom: 10px;
            border-radius: 5px;
            padding-right: 10px;
            text-align: right;
        }

        button {
            height: 30px;
            margin: 5px;
            font-size: 15px;
            font-weight: 800;
        }
    </style>
</head>

<body>
    <h1>Calculator</h1>
    <div class="container">
        <div class="calculator">
            <input type="text" placeholder="0" id="inputvalue">
            <button onclick="Clear()">AC</button>
            <button onclick="delte()">Del</button>
            <button onclick="display('/')">/</button>
            <button onclick="display('*')">*</button>
            <button onclick="display('7')">7</button>
            <button onclick="display('8')">8</button>
            <button onclick="display('9')">9</button>
            <button onclick="display('-')">-</button>
            <button onclick="display('4')">4</button>
            <button onclick="display('5')">5</button>
            <button onclick="display('6')">6</button>
            <button onclick="display('+')">+</button>
            <button onclick="display('1')">1</button>
            <button onclick="display('2')">2</button>
            <button onclick="display('3')">3</button>
            <button onclick="display('%')">%</button>
            <button onclick="display('00')">00</button>
            <button onclick="display('0')">0</button>
            <button onclick="display('.')">.</button>
            <button onclick="calculte('=')">=</button>
        </div>
    </div>

    <script>
        let outputvalue = document.getElementById("inputvalue");
        function display(num) {
            outputvalue.value += num;
        }
        function calculte() {
            try {
                outputvalue.value = eval(outputvalue.value)
            }
            catch (err) {
                alert("Invalid Input");
            }
        }

        function Clear() {
            outputvalue.value = "";
        }
        function delte() {
            outputvalue.value = outputvalue.value.slice(0, -1);
        }
    </script>
</body>

</html>
